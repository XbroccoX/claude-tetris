name: Analizar Issue con Claude

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  analyze-issue:
    if: github.event.issue.state == 'open'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Proponer diagnóstico con Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash(gh issue *)"
          prompt: |
            Eres un asistente técnico para un proyecto de Tetris en JavaScript vanilla (index.html, style.css, game.js, sin dependencias).

            Se acaba de abrir o editar el siguiente issue:
            - Número: #${{ github.event.issue.number }}
            - Título: ${{ github.event.issue.title }}
            - Cuerpo: ${{ github.event.issue.body }}
            - Autor: ${{ github.event.issue.user.login }}

            Tu única tarea es publicar un comentario con la propuesta de diagnóstico.
            NO apliques ningún label. NO hagas ninguna otra acción.

            El comentario debe estar en GitHub Flavored Markdown y seguir este formato exacto:

            ## 🔍 Propuesta de diagnóstico — Claude

            **Tipo:** [Bug / Mejora / Pregunta / Documentación / Rendimiento]
            **Severidad:** [Baja / Media / Alta]
            **Labels sugeridos:** `label1`, `label2`

            ### Diagnóstico
            [3 a 5 oraciones explicando qué falla o se solicita, su impacto en el juego y las posibles causas en el código.]

            ### Enfoque sugerido
            [2 a 3 oraciones describiendo cómo abordar la solución, mencionando las funciones o secciones de game.js relevantes si aplica.]

            ---
            _Responde `/aplicar` para confirmar y aplicar los labels sugeridos._

            Comando a usar:
            gh issue comment ${{ github.event.issue.number }} --body "..." --repo ${{ github.repository }}
